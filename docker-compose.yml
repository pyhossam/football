services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: football_tournament
      POSTGRES_USER: football_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-development-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_app -d football_tournament"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=football_tournament;Username=football_app;Password=${POSTGRES_PASSWORD:-change-this-development-password}
      Jwt__Issuer: FootballTournament
      Jwt__Audience: FootballTournament.Clients
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-replace-with-at-least-32-characters-for-local-dev}
      Database__AutoMigrate: "true"
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-admin@football.local}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:-Change-this-dev-password-123!}
      Cors__AllowedOrigins__0: http://localhost:5173
    ports:
      - "5080:8080"

volumes:
  postgres_data:
